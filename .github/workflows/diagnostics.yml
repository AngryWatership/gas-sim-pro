name: Pipeline diagnostics

on:
  schedule:
    - cron: '*/30 * * * *'   # smoke tier every 30 min
    - cron: '0 3 * * *'      # full tier nightly at 3am UTC
  workflow_run:
    workflows: ["Train model"]
    types: [completed]        # integration tier after every training run
  workflow_dispatch:
    inputs:
      tier:
        description: 'Diagnostic tier: smoke | integration | full'
        required: false
        default: 'integration'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            google-cloud-storage==2.16.0 \
            google-cloud-bigquery==3.17.2 \
            requests==2.31.0

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Determine diagnostic tier
        id: tier
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            if [[ "$HOUR" == "03" && "$MIN" -lt "5" ]]; then
              echo "tier=full" >> $GITHUB_OUTPUT
            else
              echo "tier=smoke" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "tier=integration" >> $GITHUB_OUTPUT
          else
            echo "tier=${{ github.event.inputs.tier || 'integration' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run diagnostics
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BUCKET:     ${{ secrets.GCS_BUCKET }}
          DIAG_TIER:  ${{ steps.tier.outputs.tier }}
          SERVICE_URL: ${{ secrets.VITE_CLOUD_RUN_URL }}
        run: python3 diagnostics_ci.py

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'pipeline-health',
              state: 'open'
            })
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Pipeline health check failed',
                body: `Diagnostic tier: ${{ steps.tier.outputs.tier }}\nTime: ${new Date().toISOString()}\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['pipeline-health', 'automated']
              })
            }
