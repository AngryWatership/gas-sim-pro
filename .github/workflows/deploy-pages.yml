name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:    # allow manual trigger

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GCS_REGISTRY_URL:  ${{ secrets.VITE_GCS_REGISTRY_URL }}
          VITE_CLOUD_RUN_URL:     ${{ secrets.VITE_CLOUD_RUN_URL }}
          VITE_INGEST_URL:        ${{ secrets.VITE_INGEST_URL }}
          VITE_INGEST_TOKEN:      ${{ secrets.VITE_INGEST_TOKEN }}
          VITE_COLAB_NOTEBOOK_URL: ${{ secrets.VITE_COLAB_NOTEBOOK_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: ''     # leave empty unless you have a custom domain
