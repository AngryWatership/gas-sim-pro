name: Train model

on:
  repository_dispatch:
    types: [new-training-data]
  schedule:
    - cron: '0 2 * * *'    # nightly fallback at 2am UTC
  workflow_dispatch:        # manual trigger with optional inputs
    inputs:
      force_retrain:
        description: 'Force retrain even if threshold not met'
        required: false
        default: 'false'

concurrency:
  group: training           # only one training run at a time
  cancel-in-progress: false # never cancel — let it finish

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install \
            xgboost==2.0.3 \
            scikit-learn==1.4.2 \
            pandas==2.2.1 \
            pyarrow==15.0.0 \
            joblib==1.3.2 \
            google-cloud-storage==2.16.0 \
            google-cloud-bigquery==3.17.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2.1.8
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Write training status
        run: |
          echo "running" | python3 -c "
          import sys
          from google.cloud import storage
          gcs = storage.Client(project='${{ secrets.GCP_PROJECT_ID }}')
          b = gcs.bucket('${{ secrets.GCS_BUCKET }}')
          b.blob('registry/training_status.txt').upload_from_string('running')
          print('training_status.txt = running')
          "

      - name: Run training
        env:
          PROJECT_ID:    ${{ secrets.GCP_PROJECT_ID }}
          BUCKET:        ${{ secrets.GCS_BUCKET }}
          FORCE_RETRAIN: ${{ github.event.inputs.force_retrain || 'false' }}
        run: python3 train_github_actions.py

      - name: Write training status — idle
        if: always()    # runs even if training step fails
        run: |
          python3 -c "
          from google.cloud import storage
          gcs = storage.Client(project='${{ secrets.GCP_PROJECT_ID }}')
          b = gcs.bucket('${{ secrets.GCS_BUCKET }}')
          b.blob('registry/training_status.txt').upload_from_string('idle')
          print('training_status.txt = idle')
          "

      - name: Open GitHub Issue on gate failure
        if: failure()
        uses: actions/github-script@v7.0.1
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Training failed — MAE gate or build error',
              body: `Training run failed at ${new Date().toISOString()}.\n\nWorkflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['training', 'automated']
            })
