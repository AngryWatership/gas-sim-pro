version: 2

models:
  - name: fct_training_examples
    description: >
      One training example per (layout_id, tick) — all leak counts.
      Engineered features: sensor aggregates, top-3 spatial, triangulation,
      full Approach A wall/door layout features (14), targets.
    columns:
      - name: layout_id
        tests: [not_null]
      - name: sensor_delta
        tests: [not_null]
      - name: wind_angle
        tests: [not_null]
      - name: target_centroid_row
        tests: [not_null]
      - name: target_centroid_col
        tests: [not_null]
      - name: top1_row
        tests: [not_null]
      - name: top1_col
        tests: [not_null]
      - name: n_walls
        tests: [not_null]
      - name: n_doors
        tests: [not_null]
      - name: wall_density
        tests: [not_null]
      - name: open_path_ratio
        tests: [not_null]
      - name: walls_near_centroid
        tests: [not_null]
      - name: walls_blocking_top1
        tests: [not_null]

  - name: fct_training_chained
    description: >
      Chained training samples for multi-leak experiment.
      One row per (layout_id, tick, chain_step).
    columns:
      - name: layout_id
        tests: [not_null]
      - name: chain_step
        tests: [not_null]
      - name: leak1_row
        tests: [not_null]
      - name: confidence1
        tests: [not_null]