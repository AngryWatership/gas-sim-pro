version: 2

models:
  - name: ml_export
    description: >
      ML-ready training table — single-leak (n_leaks=1), signal-filtered
      (sensor_delta >= 0.01). Includes all engineered features: sensor
      aggregates, top-3 spatial, triangulation, full Approach A wall/door
      layout (14 features), targets.
    columns:
      - name: sensor_delta
        tests: [not_null]
      - name: wind_angle
        tests: [not_null]
      - name: wind_magnitude
        tests: [not_null]
      - name: centroid_row
        tests: [not_null]
      - name: centroid_col
        tests: [not_null]
      - name: top1_row
        tests: [not_null]
      - name: top1_col
        tests: [not_null]
      - name: n_walls
        tests: [not_null]
      - name: n_doors
        tests: [not_null]
      - name: wall_density
        tests: [not_null]
      - name: open_path_ratio
        tests: [not_null]
      - name: walls_near_centroid
        tests: [not_null]
      - name: walls_blocking_top1
        tests: [not_null]
      - name: target_centroid_row
        tests: [not_null]
      - name: target_centroid_col
        tests: [not_null]
      - name: target_nearest_row
        tests: [not_null]
      - name: target_nearest_col
        tests: [not_null]